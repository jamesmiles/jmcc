name: JMCC Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JMCC_TIMEOUT: "30"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: sudo apt-get install -y libx11-dev libxext-dev

      - name: Run full suite
        run: |
          mkdir -p output
          python3 test_runner.py --native --compiler jmcc

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: output/
