name: JMCC Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JMCC_TIMEOUT: "120"

jobs:
  test:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build Docker test image
        run: docker build -t jmcc-test harness/

      - name: Run core tests (must pass)
        run: |
          mkdir -p output
          python3 test_runner.py --compiler jmcc --positive-only

      - name: Run negative tests (must pass)
        run: python3 test_runner.py --compiler jmcc --negative-only

      - name: Run external tests (informational)
        if: always()
        run: python3 test_runner.py --compiler jmcc --phase 4 || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: output/
