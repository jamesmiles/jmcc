name: JMCC Tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  JMCC_TIMEOUT: "30"

jobs:
  test-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LC_CTYPE: en_US.UTF-8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get install -y libx11-dev libxext-dev
          sudo locale-gen en_US.UTF-8

      - name: Run compiler target tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run full suite
        run: |
          mkdir -p output
          python3 test_runner.py --native --compiler jmcc

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux-x86_64
          path: output/
          if-no-files-found: ignore

  test-macos-arm64:
    name: macOS arm64
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run compiler target tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run arm64 test suite
        run: |
          mkdir -p output
          python3 test_runner.py --native --compiler jmcc --target arm64-apple-darwin --positive-only

      - name: Upload compiler artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos-arm64
          path: output/
          if-no-files-found: ignore
